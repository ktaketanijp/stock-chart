<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>経済カレンダー - StockChart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* === グローバルナビ === */
    .g-nav {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 2px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
    }
    .g-nav::-webkit-scrollbar { display: none; }
    .g-nav-logo {
      font-weight: 700;
      font-size: 15px;
      color: #58a6ff;
      text-decoration: none;
      padding-right: 16px;
      margin-right: 8px;
      border-right: 1px solid #30363d;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .g-nav-link {
      color: #8b949e;
      text-decoration: none;
      padding: 6px 11px;
      border-radius: 6px;
      font-size: 13px;
      transition: color .15s, background .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .g-nav-link:hover { color: #e6edf3; background: #21262d; }
    .g-nav-link.active { color: #58a6ff; background: rgba(31,111,235,0.12); font-weight: 600; }

    /* === メインレイアウト === */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 28px;
    }

    /* === セクションタイトル === */
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #21262d;
    }

    /* === スピナー === */
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-box {
      text-align: center;
      padding: 40px;
      color: #8b949e;
      font-size: 14px;
    }

    /* === ① 今後7日間ハイライトカード === */
    .highlight-section { margin-bottom: 36px; }
    .highlight-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .highlight-scroll::-webkit-scrollbar { height: 4px; }
    .highlight-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .hl-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 220px;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .hl-card:hover { border-color: #58a6ff; }
    .hl-card-date {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 6px;
    }
    .hl-card-event {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .hl-card-desc {
      font-size: 12px;
      color: #8b949e;
      line-height: 1.4;
    }
    .hl-empty {
      color: #8b949e;
      font-size: 14px;
      padding: 20px 0;
    }

    /* === 重要度バッジ === */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .badge-HIGH   { background: rgba(248,81,73,0.15);   color: #f85149; }
    .badge-MEDIUM { background: rgba(210,153,34,0.15);  color: #d4a017; }
    .badge-LOW    { background: rgba(139,148,158,0.12); color: #8b949e; }

    /* カテゴリバッジ */
    .cat-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(88,166,255,0.12);
      color: #58a6ff;
      margin-left: 6px;
    }

    /* === ② イベントリスト テーブル === */
    .event-section { margin-bottom: 36px; }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .filter-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

    .event-table-wrap {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
    }
    .event-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .event-table th {
      background: #21262d;
      color: #8b949e;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 10px 14px;
      text-align: left;
    }
    .event-table td {
      padding: 11px 14px;
      border-top: 1px solid #21262d;
      vertical-align: top;
    }
    .event-table tr:hover td { background: rgba(33,38,45,0.6); }

    .event-date-cell { white-space: nowrap; color: #8b949e; font-size: 12px; min-width: 90px; }
    .event-name-cell { color: #e6edf3; font-weight: 500; }
    .event-desc-cell { color: #8b949e; font-size: 12px; }

    /* 今日・直近強調 */
    .row-today td { background: rgba(31,111,235,0.06); }
    .row-soon td { background: rgba(63,185,80,0.04); }

    .no-events {
      text-align: center;
      padding: 40px;
      color: #8b949e;
      font-size: 14px;
    }

    /* === ③ 決算カレンダー === */
    .earnings-section { margin-bottom: 36px; }

    .earnings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .earnings-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }
    .earnings-card:hover { border-color: #3fb950; }
    .earnings-ticker {
      font-size: 16px;
      font-weight: 700;
      color: #58a6ff;
      min-width: 70px;
    }
    .earnings-info { flex: 1; }
    .earnings-date { font-size: 13px; color: #e6edf3; font-weight: 500; }
    .earnings-desc { font-size: 11px; color: #8b949e; margin-top: 3px; }
    .earnings-days {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(63,185,80,0.12);
      color: #3fb950;
      white-space: nowrap;
    }
    .earnings-empty {
      color: #8b949e;
      font-size: 14px;
      padding: 20px 0;
      text-align: center;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 12px;
      transition: all 0.15s;
      margin-left: auto;
    }
    .refresh-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    .section-header {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }
    .section-header .section-title { margin-bottom: 0; flex: 1; }

    /* === タブナビゲーション === */
    .tab-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 0;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      color: #8b949e;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      transition: all 0.15s;
      position: relative;
      bottom: -1px;
    }
    .tab-btn:hover { color: #e6edf3; background: #21262d; }
    .tab-btn.active {
      color: #e6edf3;
      background: #161b22;
      border-color: #30363d;
      border-bottom-color: #161b22;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* === ウォッチリスト決算カード === */
    .wl-earnings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .wl-earnings-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 0.2s;
    }
    .wl-earnings-card:hover { border-color: #58a6ff; }
    .wl-earnings-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .wl-earnings-ticker {
      font-size: 16px;
      font-weight: 700;
      color: #58a6ff;
    }
    .wl-earnings-company {
      font-size: 12px;
      color: #8b949e;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wl-earnings-date {
      font-size: 13px;
      color: #e6edf3;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .wl-earnings-eps {
      font-size: 12px;
      color: #8b949e;
    }
    .wl-earnings-empty {
      text-align: center;
      padding: 40px;
      color: #8b949e;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <nav class="g-nav">
    <a href="/" class="g-nav-logo">StockChart</a>
    <a href="/" class="g-nav-link">📈 チャート</a>
    <a href="/analysis" class="g-nav-link">📊 分析</a>
    <a href="/scanner" class="g-nav-link">🔍 スキャナー</a>
    <a href="/journal" class="g-nav-link">📒 日誌</a>
    <a href="/guide" class="g-nav-link">📖 ガイド</a>
    <a href="/status" class="g-nav-link">⚙️ 状況</a>
    <a href="/watchlist" class="g-nav-link">⭐ ウォッチリスト</a>
    <a href="/calendar" class="g-nav-link active">📅 カレンダー</a>
    <a href="/compare" class="g-nav-link">📉 比較</a>
    <a href="/news" class="g-nav-link">📰 ニュース</a>
    <a href="/portfolio" class="g-nav-link">PF</a>
  </nav>

  <main>
    <div class="page-title">経済カレンダー</div>
    <div class="page-subtitle">FRB・CPI・雇用統計などの重要経済イベントとウォッチリスト銘柄の決算日</div>

    <!-- タブナビゲーション -->
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('economic')">経済指標</button>
      <button class="tab-btn" onclick="switchTab('earnings')">主要決算</button>
      <button class="tab-btn" onclick="switchTab('watchlist-earnings')">ウォッチリスト</button>
      <button class="tab-btn" onclick="switchTab('dividends')">配当カレンダー</button>
    </div>

    <!-- タブ: 経済指標 -->
    <div class="tab-panel active" id="panel-economic">
      <!-- ① 今後7日間ハイライト -->
      <div class="highlight-section">
        <div class="section-title">今後7日間のイベント</div>
        <div id="highlight-area">
          <div class="loading-box"><div class="spinner"></div>読み込み中...</div>
        </div>
      </div>

      <!-- ② イベントリスト -->
      <div class="event-section">
        <div class="section-header">
          <div class="section-title">経済イベント一覧</div>
          <button class="refresh-btn" onclick="loadEconomic()">更新</button>
        </div>
        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn active" data-cat="ALL" onclick="setFilter(this)">すべて</button>
          <button class="filter-btn" data-cat="FRB" onclick="setFilter(this)">FRB</button>
          <button class="filter-btn" data-cat="CPI" onclick="setFilter(this)">CPI</button>
          <button class="filter-btn" data-cat="雇用" onclick="setFilter(this)">雇用統計</button>
          <button class="filter-btn" data-cat="PCE" onclick="setFilter(this)">PCE</button>
          <button class="filter-btn" data-cat="GDP" onclick="setFilter(this)">GDP</button>
          <button class="filter-btn" data-cat="景況感" onclick="setFilter(this)">ISM</button>
          <button class="filter-btn" data-cat="日銀" onclick="setFilter(this)">日銀</button>
        </div>
        <div id="event-table-area">
          <div class="loading-box"><div class="spinner"></div>読み込み中...</div>
        </div>
      </div>
    </div>

    <!-- タブ: 主要決算 -->
    <div class="tab-panel" id="panel-earnings">
      <div class="earnings-section">
        <div class="section-header">
          <div class="section-title">決算カレンダー（ウォッチリスト銘柄 / 今後90日）</div>
          <button class="refresh-btn" onclick="loadEarnings()">更新</button>
        </div>
        <div id="earnings-area">
          <div class="loading-box"><div class="spinner"></div>読み込み中...</div>
        </div>
      </div>
    </div>

    <!-- タブ: 配当カレンダー -->
    <div class="tab-panel" id="panel-dividends">
      <div class="earnings-section">
        <div class="section-header">
          <div class="section-title">ウォッチリスト 配当カレンダー</div>
          <button class="refresh-btn" onclick="loadDividendCalendar()">更新</button>
        </div>

        <!-- サマリーカード -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px">
          <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 16px">
            <div style="font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">配当銘柄数</div>
            <div id="div-count" style="font-size:22px;font-weight:700;color:#e6edf3">--</div>
          </div>
          <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 16px">
            <div style="font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">最高利回り</div>
            <div id="div-best-yield" style="font-size:22px;font-weight:700;color:#3fb950">--</div>
          </div>
          <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 16px">
            <div style="font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">次回権利落ち</div>
            <div id="div-next" style="font-size:18px;font-weight:700;color:#e6edf3">--</div>
          </div>
        </div>

        <!-- 配当テーブル -->
        <div id="dividend-table-wrapper" style="overflow-x:auto">
          <div class="loading-box"><div class="spinner"></div>読み込み中...</div>
        </div>
      </div>
    </div>

    <!-- タブ: ウォッチリスト決算 -->
    <div class="tab-panel" id="panel-watchlist-earnings">
      <div class="earnings-section">
        <div class="section-header">
          <div class="section-title">ウォッチリスト決算（EPS予想・社名付き）</div>
          <button class="refresh-btn" onclick="loadWatchlistEarnings()">更新</button>
        </div>
        <div id="watchlist-earnings-container">
          <div class="loading-box"><div class="spinner"></div>読み込み中...</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    let allEvents = [];
    let currentFilter = "ALL";
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    function todayStr() {
      return today.toISOString().slice(0, 10);
    }

    function daysUntil(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return Math.round((d - today) / 86400000);
    }

    function daysFromNow(dateStr) {
      const now = new Date();
      const target = new Date(dateStr + "T00:00:00");
      const diffDays = Math.round((target - now) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return '<span style="color:#f85149;font-weight:700">本日</span>';
      if (diffDays > 0) return `<span style="color:#8b949e">${diffDays}日後</span>`;
      return `<span style="color:#8b949e;text-decoration:line-through">${Math.abs(diffDays)}日前</span>`;
    }

    function formatDateJP(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const mm = d.getMonth() + 1;
      const dd = d.getDate();
      const days = ["日","月","火","水","木","金","土"];
      const dow = days[d.getDay()];
      return `${mm}/${dd}（${dow}）`;
    }

    function importanceBadge(imp) {
      return `<span class="badge badge-${imp}">${imp === "HIGH" ? "重要" : imp === "MEDIUM" ? "中程度" : "低"}</span>`;
    }

    // ---- ① ハイライト描画 ----
    function renderHighlight(events) {
      const area = document.getElementById("highlight-area");
      const upcoming = events.filter(e => {
        const d = daysUntil(e.date);
        return d >= 0 && d <= 7;
      });

      if (upcoming.length === 0) {
        area.innerHTML = `<p class="hl-empty">今後7日間に重要イベントはありません</p>`;
        return;
      }

      const cards = upcoming.map(e => {
        const d = daysUntil(e.date);
        const label = d === 0 ? "今日" : d === 1 ? "明日" : `${d}日後`;
        return `
          <div class="hl-card">
            ${importanceBadge(e.importance)}
            <div class="hl-card-date">${formatDateJP(e.date)} <span style="color:#58a6ff;font-weight:700">${label}</span></div>
            <div class="hl-card-event">${e.event}</div>
            <div class="hl-card-desc">${e.description}</div>
          </div>
        `;
      }).join("");

      area.innerHTML = `<div class="highlight-scroll">${cards}</div>`;
    }

    // ---- ② イベントテーブル描画 ----
    function renderEventTable(events, filter) {
      const area = document.getElementById("event-table-area");
      const filtered = filter === "ALL" ? events : events.filter(e => e.category === filter);

      if (filtered.length === 0) {
        area.innerHTML = `<div class="no-events">該当するイベントはありません</div>`;
        return;
      }

      const rows = filtered.map(e => {
        const d = daysUntil(e.date);
        let rowClass = "";
        if (d === 0) rowClass = "row-today";
        else if (d >= 1 && d <= 7) rowClass = "row-soon";

        const diffLabel = daysFromNow(e.date);

        return `
          <tr class="${rowClass}">
            <td class="event-date-cell">${formatDateJP(e.date)}<br>${diffLabel}</td>
            <td class="event-name-cell">
              ${e.event}
              <span class="cat-badge">${e.category}</span>
            </td>
            <td>${importanceBadge(e.importance)}</td>
            <td class="event-desc-cell">${e.description}</td>
          </tr>
        `;
      }).join("");

      area.innerHTML = `
        <div class="event-table-wrap">
          <table class="event-table">
            <thead>
              <tr>
                <th>日付</th>
                <th>イベント</th>
                <th>重要度</th>
                <th>説明</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    // ---- フィルター ----
    function setFilter(btn) {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.cat;
      renderEventTable(allEvents, currentFilter);
    }

    // ---- ③ 決算カレンダー描画 ----
    function renderEarnings(earnings) {
      const area = document.getElementById("earnings-area");
      if (earnings.length === 0) {
        area.innerHTML = `<p class="earnings-empty">ウォッチリストに銘柄がないか、今後90日の決算情報が取得できませんでした</p>`;
        return;
      }

      const cards = earnings.map(e => {
        const d = daysUntil(e.date);
        const daysLabel = d === 0 ? "今日" : d === 1 ? "明日" : `${d}日後`;
        return `
          <div class="earnings-card">
            <div class="earnings-ticker">${e.ticker}</div>
            <div class="earnings-info">
              <div class="earnings-date">${formatDateJP(e.date)} ${e.date}</div>
              <div class="earnings-desc">${e.description}</div>
            </div>
            <div class="earnings-days">${daysLabel}</div>
          </div>
        `;
      }).join("");

      area.innerHTML = `<div class="earnings-grid">${cards}</div>`;
    }

    // ---- タブ切り替え ----
    let watchlistEarningsLoaded = false;
    let earningsLoaded = false;
    let dividendsLoaded = false;

    function switchTab(name) {
      document.querySelectorAll(".tab-btn").forEach((b, i) => {
        const names = ["economic", "earnings", "watchlist-earnings", "dividends"];
        b.classList.toggle("active", names[i] === name);
      });
      document.querySelectorAll(".tab-panel").forEach(p => {
        p.classList.toggle("active", p.id === "panel-" + name);
      });

      // 遅延ロード（初回のみ）
      if (name === "earnings" && !earningsLoaded) {
        earningsLoaded = true;
        loadEarnings();
      }
      if (name === "watchlist-earnings" && !watchlistEarningsLoaded) {
        watchlistEarningsLoaded = true;
        loadWatchlistEarnings();
      }
      if (name === "dividends" && !dividendsLoaded) {
        dividendsLoaded = true;
        loadDividendCalendar();
      }
    }

    // ---- データ取得 ----
    async function loadEconomic() {
      document.getElementById("highlight-area").innerHTML =
        `<div class="loading-box"><div class="spinner"></div>読み込み中...</div>`;
      document.getElementById("event-table-area").innerHTML =
        `<div class="loading-box"><div class="spinner"></div>読み込み中...</div>`;
      try {
        const res = await fetch("/api/calendar/economic");
        const data = await res.json();
        allEvents = data.events || [];
        renderHighlight(allEvents);
        renderEventTable(allEvents, currentFilter);
      } catch (err) {
        document.getElementById("highlight-area").innerHTML =
          `<p style="color:#f85149;padding:16px">取得エラー: ${err.message}</p>`;
        document.getElementById("event-table-area").innerHTML =
          `<p style="color:#f85149;padding:16px">取得エラー: ${err.message}</p>`;
      }
    }

    async function loadEarnings() {
      document.getElementById("earnings-area").innerHTML =
        `<div class="loading-box"><div class="spinner"></div>読み込み中（yfinance API呼び出し中）...</div>`;
      try {
        const res = await fetch("/api/calendar/earnings");
        const data = await res.json();
        renderEarnings(data.earnings || []);
      } catch (err) {
        document.getElementById("earnings-area").innerHTML =
          `<p style="color:#f85149;padding:16px">取得エラー: ${err.message}</p>`;
      }
    }

    async function loadWatchlistEarnings() {
      const container = document.getElementById("watchlist-earnings-container");
      container.innerHTML =
        `<div class="loading-box"><div class="spinner"></div>yfinanceから取得中...</div>`;
      try {
        const resp = await fetch("/api/calendar/earnings/watchlist");
        const data = await resp.json();

        if (!data.earnings || !data.earnings.length) {
          container.innerHTML =
            `<div class="wl-earnings-empty">ウォッチリストを追加すると決算日が表示されます</div>`;
          return;
        }

        const html = data.earnings.map(e => {
          const d = daysUntil(e.date);
          const daysLabel = d === 0 ? "今日"
                          : d === 1 ? "明日"
                          : d < 0   ? `${Math.abs(d)}日前`
                          : `${d}日後`;
          const daysColor = d <= 7 && d >= 0 ? "#3fb950" : "#8b949e";
          return `
            <div class="wl-earnings-card">
              <div class="wl-earnings-header">
                <span class="wl-earnings-ticker">${e.ticker}</span>
                <span class="wl-earnings-company">${e.company || e.ticker}</span>
                <span class="earnings-days" style="color:${daysColor}">${daysLabel}</span>
              </div>
              <div class="wl-earnings-date">${formatDateJP(e.date)} ${e.date}</div>
              <div class="wl-earnings-eps">EPS予想: ${e.eps_estimate != null ? '$' + e.eps_estimate : 'N/A'}</div>
            </div>
          `;
        }).join("");

        container.innerHTML =
          `<div style="margin-bottom:10px;color:#8b949e;font-size:12px">${data.count}件取得</div>
           <div class="wl-earnings-grid">${html}</div>`;
      } catch (err) {
        container.innerHTML =
          `<p style="color:#f85149;padding:16px">取得エラー: ${err.message}</p>`;
      }
    }

    // ---- 配当カレンダー ----
    async function loadDividendCalendar() {
      const wrapper = document.getElementById("dividend-table-wrapper");
      wrapper.innerHTML = `<div class="loading-box"><div class="spinner"></div>yfinanceから取得中...</div>`;
      document.getElementById("div-count").textContent = "読込中...";

      try {
        const resp = await fetch("/api/watchlist/dividends");
        const data = await resp.json();

        if (!data.dividends || !data.dividends.length) {
          wrapper.innerHTML = `<p class="earnings-empty">ウォッチリストに配当株がありません</p>`;
          document.getElementById("div-count").textContent = "0銘柄";
          document.getElementById("div-best-yield").textContent = "—";
          document.getElementById("div-next").textContent = "情報なし";
          return;
        }

        document.getElementById("div-count").textContent = `${data.count}銘柄`;

        const bestYield = Math.max(...data.dividends.map(d => d.dividend_yield));
        const bestTicker = data.dividends.find(d => d.dividend_yield === bestYield)?.ticker;
        document.getElementById("div-best-yield").textContent = `${bestYield}% (${bestTicker})`;

        const next = data.dividends.find(d => d.ex_date && d.days_until_ex >= 0);
        document.getElementById("div-next").textContent = next
          ? `${next.ticker} (${next.days_until_ex}日後)`
          : "情報なし";

        const rows = data.dividends.map(d => {
          const daysColor = d.days_until_ex !== null && d.days_until_ex <= 7  ? "#f85149" :
                            d.days_until_ex !== null && d.days_until_ex <= 30 ? "#d4a017" : "";
          const daysWeight = d.days_until_ex !== null && d.days_until_ex <= 7 ? "700" : "400";
          const daysText = d.days_until_ex === null    ? "—" :
                           d.days_until_ex < 0         ? `${Math.abs(d.days_until_ex)}日前` :
                           d.days_until_ex === 0        ? "本日" :
                           `${d.days_until_ex}日後`;
          return `
            <tr>
              <td style="font-weight:700;color:#58a6ff">
                <a href="/analysis?ticker=${d.ticker}" style="color:#58a6ff;text-decoration:none">${d.ticker}</a>
              </td>
              <td>$${d.price}</td>
              <td>$${d.dividend_rate}</td>
              <td style="color:#3fb950;font-weight:600">${d.dividend_yield}%</td>
              <td>${d.ex_date || "—"}</td>
              <td style="color:${daysColor};font-weight:${daysWeight}">${daysText}</td>
              <td style="font-size:11px;color:#8b949e">${d.sector || "—"}</td>
            </tr>
          `;
        }).join("");

        wrapper.innerHTML = `
          <div class="event-table-wrap">
            <table class="event-table">
              <thead>
                <tr>
                  <th>銘柄</th>
                  <th>価格</th>
                  <th>配当/年(USD)</th>
                  <th>利回り</th>
                  <th>権利落ち日</th>
                  <th>残り日数</th>
                  <th>セクター</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      } catch (err) {
        wrapper.innerHTML = `<p style="color:#f85149;padding:16px">取得エラー: ${err.message}</p>`;
        document.getElementById("div-count").textContent = "エラー";
      }
    }

    // 初期ロード（経済指標タブのみ）
    loadEconomic();
  </script>
</body>
</html>
