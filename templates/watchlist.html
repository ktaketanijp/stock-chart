<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ウォッチリスト — StockChart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* === グローバルナビ === */
    .g-nav {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 2px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
    }
    .g-nav::-webkit-scrollbar { display: none; }
    .g-nav-logo {
      font-weight: 700;
      font-size: 15px;
      color: #58a6ff;
      text-decoration: none;
      padding-right: 16px;
      margin-right: 8px;
      border-right: 1px solid #30363d;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .g-nav-link {
      color: #8b949e;
      text-decoration: none;
      padding: 6px 11px;
      border-radius: 6px;
      font-size: 13px;
      transition: color .15s, background .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .g-nav-link:hover { color: #e6edf3; background: #21262d; }
    .g-nav-link.active { color: #58a6ff; background: rgba(31,111,235,0.12); font-weight: 600; }

    /* === ページ本体 === */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 20px;
    }

    /* === アラートバナー === */
    .alert-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.6;
    }
    .alert-banner-triggered {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.4);
      color: #f85149;
    }

    /* === 追加フォーム === */
    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .add-form input {
      flex: 1;
      min-width: 180px;
      max-width: 280px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
      transition: border-color 0.2s;
      text-transform: uppercase;
    }
    .add-form input:focus { border-color: #58a6ff; }
    .add-form input::placeholder { text-transform: none; color: #8b949e; }
    .btn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
    .btn-refresh {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
    }
    .btn-refresh:hover { background: #30363d; }

    /* === メッセージ === */
    .msg { font-size: 13px; color: #8b949e; margin-bottom: 16px; }
    .msg.error { color: #f85149; }

    /* === テーブル === */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #30363d;
      border-radius: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      background: #161b22;
      color: #8b949e;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #30363d;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #21262d;
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #161b22; }
    td {
      padding: 13px 16px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .ticker-cell {
      font-weight: 700;
      font-size: 15px;
      color: #58a6ff;
    }

    .price-cell { font-weight: 600; font-size: 15px; }

    .change-cell { font-weight: 600; }
    .change-pos { color: #3fb950; }
    .change-neg { color: #f85149; }
    .change-zero { color: #8b949e; }

    /* シグナルバッジ */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
    }
    .badge-STRONG_BUY  { background: #0a4429; color: #3fb950; border: 1px solid #238636; }
    .badge-BUY         { background: rgba(63,185,80,0.12); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
    .badge-NEUTRAL     { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .badge-SELL        { background: rgba(248,81,73,0.12); color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
    .badge-STRONG_SELL { background: #3d0e0a; color: #f85149; border: 1px solid #6e1b18; }
    .badge-null        { background: #21262d; color: #8b949e; border: 1px solid #30363d; }

    .score-cell { color: #c9d1d9; font-size: 13px; }

    .link-cell a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 13px;
    }
    .link-cell a:hover { text-decoration: underline; }

    .del-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .del-btn:hover { border-color: #f85149; color: #f85149; }

    /* アラートボタン */
    .alert-btn {
      background: rgba(88, 166, 255, 0.08);
      border: 1px solid rgba(88, 166, 255, 0.3);
      color: #58a6ff;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .alert-btn:hover { background: rgba(88, 166, 255, 0.18); }

    .empty-row td {
      text-align: center;
      color: #8b949e;
      padding: 40px;
      font-size: 14px;
    }

    /* ローディングスケルトン */
    .skeleton {
      display: inline-block;
      background: #21262d;
      border-radius: 4px;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%  { opacity: .5; }
      50% { opacity: 1;  }
      100%{ opacity: .5; }
    }

    .updated-info {
      font-size: 12px;
      color: #8b949e;
      margin-top: 14px;
      text-align: right;
    }

    /* === アラート一覧セクション === */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #e6edf3;
      margin: 36px 0 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .check-now-btn {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
    }
    .check-now-btn:hover { background: #30363d; }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .status-active {
      background: rgba(63,185,80,0.12);
      color: #3fb950;
      border: 1px solid rgba(63,185,80,0.3);
    }
    .status-triggered {
      background: rgba(248,81,73,0.12);
      color: #f85149;
      border: 1px solid rgba(248,81,73,0.3);
    }

    /* === モーダル === */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 28px;
      width: 380px;
      max-width: 92vw;
    }
    .modal h3 {
      font-size: 17px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 22px;
    }
    .modal-field { margin-bottom: 16px; }
    .modal-field label {
      display: block;
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .modal-field select,
    .modal-field input[type="number"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .modal-field select:focus,
    .modal-field input[type="number"]:focus { border-color: #58a6ff; }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }
    .btn-cancel {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
    }
    .btn-cancel:hover { background: #30363d; }
    .modal-msg {
      font-size: 13px;
      color: #f85149;
      margin-top: 10px;
      min-height: 18px;
    }

    /* === モーダルタブ === */
    .modal-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 10px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 13px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: color .15s, background .15s;
    }
    .tab-btn:hover { color: #e6edf3; background: #21262d; }
    .tab-btn.active { color: #58a6ff; background: rgba(31,111,235,0.12); }

    /* テクニカルタブの select */
    #tech-tab select {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
      transition: border-color .2s;
    }
    #tech-tab select:focus { border-color: #58a6ff; }
  </style>
</head>
<body>

  <nav class="g-nav">
    <a href="/" class="g-nav-logo">StockChart</a>
    <a href="/" class="g-nav-link">📈 チャート</a>
    <a href="/analysis" class="g-nav-link">📊 分析</a>
    <a href="/scanner" class="g-nav-link">🔍 スキャナー</a>
    <a href="/journal" class="g-nav-link">📒 日誌</a>
    <a href="/guide" class="g-nav-link">📖 ガイド</a>
    <a href="/status" class="g-nav-link">⚙️ 状況</a>
    <a href="/market" class="g-nav-link">🌐 市場</a>
    <a href="/watchlist" class="g-nav-link active">⭐ ウォッチリスト</a>
    <a href="/calendar" class="g-nav-link">📅 カレンダー</a>
    <a href="/compare" class="g-nav-link">📉 比較</a>
    <a href="/news" class="g-nav-link">📰 ニュース</a>
    <a href="/portfolio" class="g-nav-link">PF</a>
  </nav>

  <div class="container">
    <h1>⭐ ウォッチリスト</h1>

    <!-- トリガー済みアラート通知バナー -->
    <div id="alert-banner"></div>

    <div class="add-form">
      <input type="text" id="ticker-input" placeholder="銘柄コードを入力 (例: AAPL)" maxlength="20">
      <button class="btn" id="add-btn" onclick="addTicker()">追加</button>
      <button class="btn btn-refresh" id="refresh-btn" onclick="loadWatchlist(true)">更新</button>
    </div>

    <div class="msg" id="status-msg"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>銘柄</th>
            <th>現在値</th>
            <th>変動率</th>
            <th>AIシグナル</th>
            <th>スコア</th>
            <th>アラート</th>
            <th>分析</th>
            <th>削除</th>
          </tr>
        </thead>
        <tbody id="watchlist-body">
          <tr class="empty-row"><td colspan="8">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="updated-info" id="updated-info"></div>

    <!-- アラート一覧 -->
    <div class="section-title">
      🔔 アラート一覧
      <button class="check-now-btn" onclick="checkAlerts()">今すぐチェック</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>銘柄</th>
            <th>条件</th>
            <th>設定価格</th>
            <th>ステータス</th>
            <th>トリガー日時</th>
            <th>トリガー価格</th>
            <th>削除</th>
          </tr>
        </thead>
        <tbody id="alerts-body">
          <tr class="empty-row"><td colspan="7">アラートが設定されていません</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- アラート設定モーダル -->
  <div class="modal-overlay" id="alert-modal">
    <div class="modal">
      <h3>🔔 アラート設定 — <span id="modal-ticker"></span></h3>

      <!-- タブ切替 -->
      <div class="modal-tabs">
        <button class="tab-btn active" id="tab-price-btn" onclick="switchTab('price')">価格アラート</button>
        <button class="tab-btn" id="tab-tech-btn" onclick="switchTab('technical')">テクニカル</button>
      </div>

      <!-- 価格アラートタブ -->
      <div id="price-tab">
        <div class="modal-field">
          <label>条件</label>
          <select id="modal-condition">
            <option value="above">以上になったら (価格が設定値を上回る)</option>
            <option value="below">以下になったら (価格が設定値を下回る)</option>
          </select>
        </div>
        <div class="modal-field">
          <label>価格</label>
          <input type="number" id="modal-price" step="0.01" min="0.01" placeholder="例: 200.00">
        </div>
      </div>

      <!-- テクニカルアラートタブ -->
      <div id="tech-tab" style="display:none">
        <div class="modal-field">
          <label>条件</label>
          <select id="tech-condition">
            <option value="golden_cross">ゴールデンクロス (MA20 > MA50)</option>
            <option value="dead_cross">デッドクロス (MA20 < MA50)</option>
            <option value="rsi_oversold">RSI 30以下 (売られすぎ)</option>
            <option value="rsi_overbought">RSI 70以上 (買われすぎ)</option>
          </select>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn" onclick="createAlert()">設定</button>
        <button class="btn btn-cancel" onclick="closeAlertModal()">キャンセル</button>
      </div>
      <div class="modal-msg" id="modal-msg"></div>
    </div>
  </div>

  <script>
    let autoRefreshTimer = null;
    const AUTO_REFRESH_SEC = 30;
    let currentAlertTicker = null;
    let currentAlertTab = 'price';

    // =====================
    // ウォッチリスト
    // =====================

    function signalLabel(sig) {
      const map = {
        STRONG_BUY:  '強買',
        BUY:         '買い',
        NEUTRAL:     '中立',
        SELL:        '売り',
        STRONG_SELL: '強売',
      };
      return map[sig] || (sig || '—');
    }

    function badgeClass(sig) {
      if (!sig) return 'badge-null';
      return 'badge-' + sig;
    }

    function changeCellClass(pct) {
      if (pct === null || pct === undefined) return 'change-zero';
      if (pct > 0) return 'change-pos';
      if (pct < 0) return 'change-neg';
      return 'change-zero';
    }

    function formatChange(pct) {
      if (pct === null || pct === undefined) return '—';
      const sign = pct >= 0 ? '+' : '';
      return sign + pct.toFixed(2) + '%';
    }

    function formatPrice(price) {
      if (price === null || price === undefined) return '—';
      return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderRow(item) {
      const changeClass = changeCellClass(item.change_pct);
      const bClass = badgeClass(item.signal);
      const scoreText = item.score !== null && item.score !== undefined ? item.score : '—';
      return `
        <tr>
          <td class="ticker-cell">${escHtml(item.ticker)}</td>
          <td class="price-cell">${formatPrice(item.price)}</td>
          <td class="change-cell ${changeClass}">${formatChange(item.change_pct)}</td>
          <td><span class="badge ${bClass}">${signalLabel(item.signal)}</span></td>
          <td class="score-cell">${scoreText}</td>
          <td><button class="alert-btn" onclick="openAlertModal('${escHtml(item.ticker)}')">アラート設定</button></td>
          <td class="link-cell"><a href="/?ticker=${encodeURIComponent(item.ticker)}" target="_blank">チャート</a>
            &nbsp;|&nbsp;
            <a href="/analysis?ticker=${encodeURIComponent(item.ticker)}" target="_blank">分析</a>
          </td>
          <td><button class="del-btn" onclick="removeTicker('${escHtml(item.ticker)}')">削除</button></td>
        </tr>
      `;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setStatus(msg, isError) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = 'msg' + (isError ? ' error' : '');
    }

    async function loadWatchlist(showRefreshing) {
      if (showRefreshing) setStatus('更新中...', false);
      clearTimeout(autoRefreshTimer);

      try {
        const res = await fetch('/api/watchlist');
        const data = await res.json();
        const tbody = document.getElementById('watchlist-body');

        if (!data.tickers || data.tickers.length === 0) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="8">ウォッチリストは空です。銘柄コードを入力して追加してください。</td></tr>';
        } else {
          tbody.innerHTML = data.tickers.map(renderRow).join('');
        }

        // 更新時刻
        const lastUpdated = data.tickers.length > 0 ? data.tickers[0].updated : null;
        document.getElementById('updated-info').textContent = lastUpdated
          ? '最終更新: ' + lastUpdated + '　(30秒ごとに自動更新)'
          : '';
        if (showRefreshing) setStatus('', false);
      } catch (err) {
        setStatus('データ取得に失敗しました: ' + err.message, true);
      }

      // 30秒後に自動更新
      autoRefreshTimer = setTimeout(() => loadWatchlist(false), AUTO_REFRESH_SEC * 1000);
    }

    async function addTicker() {
      const input = document.getElementById('ticker-input');
      const ticker = input.value.trim().toUpperCase();
      if (!ticker) { setStatus('銘柄コードを入力してください', true); return; }

      const btn = document.getElementById('add-btn');
      btn.disabled = true;
      setStatus('追加中...', false);

      try {
        const res = await fetch('/api/watchlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticker }),
        });
        const data = await res.json();
        if (data.error) {
          setStatus('エラー: ' + data.error, true);
        } else {
          input.value = '';
          setStatus(ticker + ' を追加しました', false);
          loadWatchlist(false);
        }
      } catch (err) {
        setStatus('追加に失敗しました: ' + err.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    async function removeTicker(ticker) {
      if (!confirm(ticker + ' をウォッチリストから削除しますか？')) return;

      try {
        const res = await fetch('/api/watchlist/' + encodeURIComponent(ticker), { method: 'DELETE' });
        const data = await res.json();
        if (data.error) {
          setStatus('削除エラー: ' + data.error, true);
        } else {
          setStatus(ticker + ' を削除しました', false);
          loadWatchlist(false);
        }
      } catch (err) {
        setStatus('削除に失敗しました: ' + err.message, true);
      }
    }

    // =====================
    // アラートモーダル
    // =====================

    function switchTab(tab) {
      currentAlertTab = tab;
      document.getElementById('price-tab').style.display = tab === 'price' ? '' : 'none';
      document.getElementById('tech-tab').style.display = tab === 'technical' ? '' : 'none';
      document.getElementById('tab-price-btn').classList.toggle('active', tab === 'price');
      document.getElementById('tab-tech-btn').classList.toggle('active', tab === 'technical');
      document.getElementById('modal-msg').textContent = '';
    }

    function openAlertModal(ticker) {
      currentAlertTicker = ticker;
      currentAlertTab = 'price';
      document.getElementById('modal-ticker').textContent = ticker;
      document.getElementById('modal-price').value = '';
      document.getElementById('modal-msg').textContent = '';
      switchTab('price');
      document.getElementById('alert-modal').classList.add('open');
      setTimeout(() => document.getElementById('modal-price').focus(), 100);
    }

    function closeAlertModal() {
      document.getElementById('alert-modal').classList.remove('open');
      currentAlertTicker = null;
    }

    async function createAlert() {
      if (!currentAlertTicker) return;
      const msgEl = document.getElementById('modal-msg');
      msgEl.textContent = '';

      if (currentAlertTab === 'technical') {
        // テクニカルアラート
        const condition = document.getElementById('tech-condition').value;
        try {
          const res = await fetch('/api/alerts/technical', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker: currentAlertTicker, condition }),
          });
          const data = await res.json();
          if (data.error) {
            msgEl.textContent = 'エラー: ' + data.error;
          } else {
            closeAlertModal();
            loadAlerts();
            setStatus(currentAlertTicker + ' のテクニカルアラートを設定しました', false);
          }
        } catch (err) {
          msgEl.textContent = '設定に失敗しました: ' + err.message;
        }
      } else {
        // 価格アラート
        const condition = document.getElementById('modal-condition').value;
        const priceVal = document.getElementById('modal-price').value;
        const price = parseFloat(priceVal);

        if (!priceVal || isNaN(price) || price <= 0) {
          msgEl.textContent = '有効な価格を入力してください';
          return;
        }

        try {
          const res = await fetch('/api/alerts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker: currentAlertTicker, condition, price }),
          });
          const data = await res.json();
          if (data.error) {
            msgEl.textContent = 'エラー: ' + data.error;
          } else {
            closeAlertModal();
            loadAlerts();
            setStatus(currentAlertTicker + ' のアラートを設定しました', false);
          }
        } catch (err) {
          msgEl.textContent = '設定に失敗しました: ' + err.message;
        }
      }
    }

    // モーダル外クリックで閉じる
    document.getElementById('alert-modal').addEventListener('click', function(e) {
      if (e.target === this) closeAlertModal();
    });

    // =====================
    // アラート一覧
    // =====================

    async function loadAlerts() {
      try {
        const res = await fetch('/api/alerts');
        const data = await res.json();
        renderAlerts(data.alerts || []);
        showTriggeredBanner(data.alerts || []);
      } catch (err) {
        console.error('アラート取得エラー:', err);
      }
    }

    async function checkAlerts() {
      setStatus('アラートをチェック中...', false);
      try {
        const res = await fetch('/api/alerts/check', { method: 'POST' });
        const data = await res.json();
        renderAlerts(data.alerts || []);
        showTriggeredBanner(data.alerts || []);
        const cnt = (data.triggered || []).length;
        setStatus(cnt > 0 ? 'アラート ' + cnt + ' 件が発動しました' : 'チェック完了（発動なし）', false);
      } catch (err) {
        setStatus('チェックに失敗しました: ' + err.message, true);
      }
    }

    function renderAlerts(alerts) {
      const tbody = document.getElementById('alerts-body');
      if (!alerts.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">アラートが設定されていません</td></tr>';
        return;
      }
      tbody.innerHTML = alerts.map(a => {
        const isTech = a.type === 'technical';
        let condLabel, priceCell;
        if (isTech) {
          condLabel = escHtml(a.description || a.condition);
          priceCell = '<span style="color:#8b949e;font-size:12px">テクニカル</span>';
        } else {
          condLabel = a.condition === 'above' ? '以上になったら' : '以下になったら';
          priceCell = (a.price !== null && a.price !== undefined)
            ? '<span style="font-weight:600">$' + Number(a.price).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '</span>'
            : '—';
        }
        const statusBadge = a.triggered
          ? '<span class="status-badge status-triggered">トリガー済</span>'
          : '<span class="status-badge status-active">監視中</span>';
        const triggeredAt = a.triggered_at || '—';
        let triggeredVal;
        if (isTech) {
          triggeredVal = (a.triggered_value !== null && a.triggered_value !== undefined)
            ? 'RSI: ' + a.triggered_value
            : (a.triggered ? '発動' : '—');
        } else {
          triggeredVal = (a.triggered_price !== null && a.triggered_price !== undefined)
            ? '$' + Number(a.triggered_price).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            : '—';
        }
        return '<tr>' +
          '<td class="ticker-cell">' + escHtml(a.ticker) + '</td>' +
          '<td style="color:#c9d1d9">' + condLabel + '</td>' +
          '<td>' + priceCell + '</td>' +
          '<td>' + statusBadge + '</td>' +
          '<td style="color:#8b949e;font-size:13px">' + escHtml(triggeredAt) + '</td>' +
          '<td style="color:#8b949e;font-size:13px">' + escHtml(triggeredVal) + '</td>' +
          '<td><button class="del-btn" onclick="deleteAlertItem(\'' + escHtml(String(a.id)) + '\')">削除</button></td>' +
          '</tr>';
      }).join('');
    }

    function showTriggeredBanner(alerts) {
      const triggered = alerts.filter(a => a.triggered);
      const banner = document.getElementById('alert-banner');
      if (!triggered.length) {
        banner.innerHTML = '';
        return;
      }
      const items = triggered.map(a => {
        const condLabel = a.condition === 'above' ? '以上' : '以下';
        return '<strong>' + escHtml(a.ticker) + '</strong> が $' + a.triggered_price +
          ' に到達（設定: $' + a.price + ' ' + condLabel + '、' + escHtml(a.triggered_at || '') + '）';
      });
      banner.innerHTML = '<div class="alert-banner alert-banner-triggered">🔔 アラート発動: ' + items.join(' / ') + '</div>';
    }

    async function deleteAlertItem(alertId) {
      if (!confirm('このアラートを削除しますか？')) return;
      try {
        const res = await fetch('/api/alerts/' + encodeURIComponent(alertId), { method: 'DELETE' });
        const data = await res.json();
        if (data.error) {
          setStatus('削除エラー: ' + data.error, true);
        } else {
          loadAlerts();
        }
      } catch (err) {
        setStatus('削除に失敗しました: ' + err.message, true);
      }
    }

    // Enterキーで追加
    document.getElementById('ticker-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTicker();
    });

    // モーダル内Enterで設定
    document.getElementById('modal-price').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') createAlert();
    });

    // 初回ロード
    loadWatchlist(false);
    loadAlerts();

    // 5分ごとにアラート状態を更新
    setInterval(() => loadAlerts(), 5 * 60 * 1000);
  </script>
</body>
</html>
